name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          target-branch: main

  build-and-deploy:
    needs: release-please
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each font variant is published to its own gh-pages branch.
        font:
          - { key: all, suffix: '' }
          - { key: cdn, suffix: '-cdn-fonts' }
          - { key: firasans, suffix: '-firasans-only' }
          - { key: misans, suffix: '-misans-only' }
          - { key: pingfang, suffix: '-pingfang-only' }
          - { key: sarasa, suffix: '-sarasa-only' }
          - { key: none, suffix: '-no-fonts' }

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install and Build 🔧
        env:
          FONT: ${{ matrix.font.key }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          echo 'zash.zend.eu.org' > ./dist/CNAME

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages${{ matrix.font.suffix }}
          force_orphan: true

  release-dist:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        font:
          - { key: all, suffix: '' }
          - { key: cdn, suffix: '-cdn-fonts' }
          - { key: firasans, suffix: '-firasans-only' }
          - { key: misans, suffix: '-misans-only' }
          - { key: pingfang, suffix: '-pingfang-only' }
          - { key: sarasa, suffix: '-sarasa-only' }
          - { key: none, suffix: '-no-fonts' }

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Build and Zip the dist folder
        env:
          FONT: ${{ matrix.font.key }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          echo 'zash.zend.eu.org' > ./dist/CNAME
          zip -r dist${{ matrix.font.suffix }}.zip dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist${{ matrix.font.suffix }}.zip
          tag_name: ${{ needs.release-please.outputs.tag_name }}
